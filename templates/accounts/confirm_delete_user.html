{% extends 'base.html' %}

{% block title %}
Confirm Delete User
{% endblock %}

{% block content %}
<h1>Confirm Delete</h1>
<p>Are you sure you want to delete user <strong>{{ user_obj.username }}</strong> ?</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'developer_dashboard' %}">Cancel</a>
</form>
{% endblock %}
