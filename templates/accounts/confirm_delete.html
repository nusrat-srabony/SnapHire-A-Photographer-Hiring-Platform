{% extends 'base.html' %}

{% block title %}
Confirm Delete
{% endblock %}

{% block content %}
<h1>Confirm Delete</h1>
<p>Are you sure you want to delete this item?</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="javascript:history.back()">Cancel</a>
</form>
{% endblock %}
